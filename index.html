<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weylin Wagnon — Resume</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #1E1B2E; font-family: system-ui, -apple-system, sans-serif; }
    body { display: flex; flex-direction: column; align-items: center; }
    header {
      width: 100%;
      padding: 24px 32px;
      background: linear-gradient(135deg, #1E1B2E, #352B6B);
      color: #fff;
      text-align: center;
    }
    header h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: 0.5px; }
    header p { font-size: 0.85rem; color: #B0ABCF; margin-top: 4px; }
    .actions {
      padding: 16px;
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .actions a {
      display: inline-block;
      padding: 10px 24px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .actions a:hover { opacity: 0.85; }
    .btn-primary { background: #5B4FC4; color: #fff; }
    .btn-secondary { background: #F5F4F8; color: #2D2D2D; }
    .pdf-wrap {
      flex: 1;
      width: 100%;
      max-width: 900px;
      padding: 0 16px 16px;
    }
    iframe {
      width: 100%;
      height: 100%;
      min-height: 80vh;
      border: none;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <header>
    <h1>Weylin Wagnon</h1>
    <p>Senior Full Stack Engineer | Backend & Platform | AI & Web Apps</p>
  </header>
  <div class="actions">
    <a class="btn-primary" href="outputs/2026-03-14-resume.pdf" download>Download PDF</a>
    <a class="btn-secondary" href="https://github.com/waggertron/weylin-wagnon-resume">View Source</a>
  </div>
  <div class="pdf-wrap">
    <iframe src="outputs/2026-03-14-resume.pdf"></iframe>
  </div>
</body>
</html>
